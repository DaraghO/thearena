<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Arena</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
    --stage:#12151f; --stage-2:#191d2b;
    --sand:#e7d6ad; --sand-line:#d3bd8f; --sand-edge:#c3a86f;
    --rim:#3b3324; --ink:#241f18;
    --you:#18b3c4; --you-dark:#0d7c89; --you-light:#54d3df;
    --enemy:#ef5a3c; --enemy-dark:#b23a22; --enemy-light:#ff8b6f;
    --gold:#ffc23c; --text:#f4efe6; --muted:#98917f;
    --card:#20242f; --card-line:#2f3542;
    --font-display:"Fredoka", ui-rounded, system-ui, sans-serif;
    --font-ui:system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
}
*{ box-sizing:border-box; }
html,body{ margin:0; padding:0; background:var(--stage); color:var(--text); font-family:var(--font-ui); -webkit-tap-highlight-color:transparent; }
.hidden{ display:none !important; }
button{ font-family:var(--font-ui); cursor:pointer; }
button:focus-visible{ outline:3px solid var(--gold); outline-offset:2px; }

.frame{
    max-width:430px; margin:0 auto; min-height:100dvh;
    background:radial-gradient(120% 80% at 50% 0%, var(--stage-2), var(--stage) 70%);
    display:flex; flex-direction:column;
}

/* ---------- LOBBY ---------- */
.lobby{ flex:1; display:flex; flex-direction:column; padding:34px 22px 22px; }
.brand{ text-align:center; margin-bottom:28px; }
.brand .crest{ width:76px; height:76px; margin:0 auto 10px; display:block; }
.brand h1{ font-family:var(--font-display); font-weight:700; font-size:44px; line-height:.9; letter-spacing:1px; margin:0; }
.brand h1 em{ color:var(--gold); font-style:normal; }
.brand p{ color:var(--muted); font-size:14px; margin:8px 0 0; letter-spacing:.3px; }

.make-room{ display:flex; gap:10px; margin-bottom:26px; }
.make-room input{ flex:1; min-width:0; background:var(--card); border:1px solid var(--card-line); border-radius:12px; color:var(--text); padding:14px 16px; font-size:16px; }
.make-room input::placeholder{ color:var(--muted); }
.make-room input:focus-visible{ outline:none; border-color:var(--you); }
.btn-primary{ background:var(--you); color:#062a2e; border:none; border-radius:12px; padding:0 20px; font-weight:700; font-size:15px; box-shadow:0 4px 0 var(--you-dark); }
.btn-primary:active{ transform:translateY(3px); box-shadow:0 1px 0 var(--you-dark); }

.rooms-head{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:12px; }
.rooms-head h2{ font-family:var(--font-display); font-weight:600; font-size:18px; margin:0; }
.rooms-head .count{ color:var(--muted); font-size:13px; }
.status{ color:var(--muted); font-size:13px; min-height:18px; margin:0 0 10px; }

.room{ display:flex; align-items:center; gap:14px; background:var(--card); border:1px solid var(--card-line); border-radius:14px; padding:14px; margin-bottom:10px; }
.room .dot{ width:10px; height:10px; border-radius:50%; background:#5cd08a; flex:none; box-shadow:0 0 0 4px rgba(92,208,138,.15); }
.room .info{ flex:1; min-width:0; }
.room .name{ font-weight:600; font-size:15px; }
.room .sub{ color:var(--muted); font-size:12px; margin-top:2px; }
.btn-join{ background:transparent; color:var(--you-light); border:1.5px solid var(--you-dark); border-radius:10px; padding:9px 16px; font-weight:700; font-size:13px; }
.btn-join:active{ background:var(--you-dark); color:#fff; }
.empty{ color:var(--muted); font-size:13px; padding:8px 2px; }

/* ---------- ARENA ---------- */
.arena{ flex:1; display:flex; flex-direction:column; }
.topbar{ display:flex; align-items:center; justify-content:space-between; padding:12px 16px 6px; }
.side-tag{ display:flex; align-items:center; gap:8px; font-weight:600; font-size:13px; }
.side-tag .pip{
    width:12px;
    height:12px;
    border-radius:4px;
    background:var(--enemy);
}

.side-tag.you-tag .pip{
    background:var(--you);
}
.match-center{
    display:flex;
    flex-direction:column;
    align-items:center;
    line-height:1;
}

.match-clock{
    font-family:var(--font-display);
    font-weight:700;
    font-size:24px;
    letter-spacing:1px;
    color:var(--text);
}

.match-clock.urgent{
    color:var(--enemy-light);
    animation:matchClockPulse .7s ease-in-out infinite;
}

.match-info{
    font-family:var(--font-display);
    font-weight:600;
    font-size:12px;
    letter-spacing:.5px;
    color:var(--muted);
    margin-top:4px;
}

@keyframes matchClockPulse{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.08); }
}
.gold-chip{ display:inline-flex; align-items:center; gap:6px; background:rgba(255,194,60,.12); border:1px solid rgba(255,194,60,.35); color:var(--gold); border-radius:999px; padding:5px 12px 5px 8px; font-weight:700; font-size:14px; }
.gold-chip .coin{ width:16px; height:16px; border-radius:50%; background:radial-gradient(circle at 35% 30%, #ffe08a, var(--gold)); border:1.5px solid #b9821a; }
.player-gold{
    margin-left:auto;
    margin-right:10px;
    padding:7px 14px 7px 9px;
    font-size:16px;
    flex:none;
}

    .gold-warning{
    position:absolute;
    left:50%;
    bottom:calc(100% + 8px);
    z-index:5;
    width:max-content;
    padding:5px 9px;
    border-radius:8px;
    background:rgba(25,8,8,.95);
    border:1px solid var(--enemy);
    color:#ff8b7a;
    font-family:var(--font-display);
    font-size:13px;
    font-weight:700;
    text-shadow:0 1px 2px #000;
    pointer-events:none;
    opacity:0;
    transform:translateX(-50%) scale(.8);
}

.gold-warning.show{
    animation:goldWarningPop .9s ease-out forwards;
}

@keyframes goldWarningPop{
    0%{
        opacity:0;
        transform:translateX(-50%) scale(.8);
    }

    15%{
        opacity:1;
        transform:translateX(-50%) scale(1.08);
    }

    30%{
        transform:translateX(-50%) scale(1);
    }

    75%{
        opacity:1;
    }

    100%{
        opacity:0;
        transform:translateX(-50%) translateY(-8px);
    }
}

.game-card.unaffordable{
    filter:saturate(.65) brightness(.8);
}

.game-card.no-gold{
    animation:noGoldCardShake .4s ease;
}

.player-gold.no-gold{
    animation:noGoldChipShake .45s ease;
}

@keyframes noGoldCardShake{
    0%,100%{ transform:translateX(0); }
    20%{ transform:translateX(-6px) rotate(-1deg); }
    40%{ transform:translateX(6px) rotate(1deg); }
    60%{ transform:translateX(-5px); }
    80%{ transform:translateX(4px); }
}

@keyframes noGoldChipShake{
    0%,100%{
        transform:translateX(0);
        border-color:rgba(255,194,60,.35);
        color:var(--gold);
    }

    20%{
        transform:translateX(-4px);
    }

    40%{
        transform:translateX(4px);
        border-color:var(--enemy);
        color:#ff7e68;
    }

    60%{
        transform:translateX(-3px);
    }

    80%{
        transform:translateX(2px);
    }
}
.board-wrap{ flex:1; padding:6px 8px 2px; min-height:0; }
#board{ width:100%; height:100%; display:block; }
/* -- new lane stuff -- */
 .lane-select{
    fill:rgba(24,179,196,0);
    stroke:transparent;
    stroke-width:4;
    cursor:pointer;
    transition:
        fill .15s ease,
        stroke .15s ease,
        filter .15s ease;
}

.lane-select:hover{
    fill:rgba(24,179,196,.10);
}

.lane-select.selected{
    fill:rgba(24,179,196,.20);
    stroke:var(--you);
    filter:drop-shadow(0 0 6px rgba(24,179,196,.65));
}

.tray.locked + * .lane-select,
.arena:has(.tray.locked) .lane-select{
    pointer-events:none;
}   

    
/* rig visuals + states, shared by board troops and card portraits */
.rig .shadow{ fill:rgba(20,15,8,.28); }
.rig .torso{ fill:var(--team); stroke:var(--ink); stroke-width:2.5; }
.rig .emblem{ fill:var(--team-light); }
.rig .leg{ fill:var(--team-dark); stroke:var(--ink); stroke-width:2.5; }
.rig .limb{ fill:var(--team-dark); stroke:var(--ink); stroke-width:2.5; }
.rig .helmet{ fill:var(--team-light); stroke:var(--ink); stroke-width:2.5; }
.rig .visor{ fill:var(--ink); }
.rig .plume{ fill:var(--gold); }
.rig .blade{ fill:#dfe6ee; stroke:var(--ink); stroke-width:2; }
.rig .guard{ fill:#9aa4b0; stroke:var(--ink); stroke-width:2; }
.rig .pawn-q{ fill:var(--ink); font-family:var(--font-display); font-weight:700; font-size:22px; }
.rig.team-you{ --team:var(--you); --team-dark:var(--you-dark); --team-light:var(--you-light); }
.rig.team-enemy{ --team:var(--enemy); --team-dark:var(--enemy-dark); --team-light:var(--enemy-light); }

.rig .leg, .rig .arm-l, .rig .arm-r, .rig .body, .rig{ transform-box:fill-box; }
.rig .leg{ transform-origin:50% 0%; }
.rig .arm-l{ transform-origin:50% 0%; }
.rig .arm-r{ transform-origin:47% 61%; }
.rig .body{ transform-origin:50% 100%; }

.rig.state-pose .body{ animation:breathe 2.6s ease-in-out infinite; }
.rig.state-pose .arm-r{ transform:rotate(-12deg); animation:proud 2.6s ease-in-out infinite; }
@keyframes breathe{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-2px); } }
@keyframes proud{ 0%,100%{ transform:rotate(-12deg); } 50%{ transform:rotate(-18deg); } }

.rig.state-walk .leg-l{ animation:step 0.6s ease-in-out infinite; }
.rig.state-walk .leg-r{ animation:step 0.6s ease-in-out infinite reverse; }
.rig.state-walk .body{ animation:bob 0.6s ease-in-out infinite; }
.rig.state-walk .arm-r{ transform:rotate(-10deg); }
@keyframes step{ 0%{ transform:rotate(20deg); } 50%{ transform:rotate(-20deg); } 100%{ transform:rotate(20deg); } }
@keyframes bob{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-3px); } }

.rig.state-attack .arm-r{ animation:swing 0.7s ease-in-out infinite; }
.rig.state-attack .body{ animation:lunge 0.7s ease-in-out infinite; }
@keyframes swing{ 0%{ transform:rotate(-40deg); } 35%{ transform:rotate(-55deg); } 60%{ transform:rotate(40deg); } 100%{ transform:rotate(-40deg); } }
@keyframes lunge{ 0%,100%{ transform:translateY(0); } 55%{ transform:translateY(-4px); } }

.rig.state-die{ animation:die 0.9s ease-in forwards; }
@keyframes die{ 0%{ transform:rotate(0) translateY(0); opacity:1; } 100%{ transform:rotate(78deg) translateY(6px); opacity:.15; } }


/* --- added near rig rules ---- */
    .rig.state-idle .arm-r{ transform:rotate(-12deg); }

#result{ position:fixed; inset:0; z-index:20; display:flex; align-items:center; justify-content:center; background:rgba(10,12,20,.72); backdrop-filter:blur(2px); }
#result .result-card{ background:var(--card); border:2px solid var(--card-line); border-radius:20px; padding:34px 44px; text-align:center; }
#result .result-text{ font-family:var(--font-display); font-weight:700; font-size:40px; color:var(--enemy); }
#result.win .result-text{ color:var(--you-light); }
#result .result-sub{ color:var(--muted); font-size:14px; margin-top:6px; }



    .rematch-btn{
    width:100%;
    margin-top:22px;
    background:var(--you);
    color:#062a2e;
    border:none;
    border-radius:12px;
    padding:13px 22px;
    font-family:var(--font-display);
    font-size:17px;
    font-weight:700;
    box-shadow:0 4px 0 var(--you-dark);
}

.rematch-btn:active{
    transform:translateY(3px);
    box-shadow:0 1px 0 var(--you-dark);
}

.rematch-btn:disabled{
    background:#3a414e;
    color:var(--muted);
    box-shadow:none;
    cursor:default;
    transform:none;
}

.rematch-status{
    min-height:18px;
    margin-top:12px;
    color:var(--muted);
    font-size:13px;
}

.result-actions{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-top:22px;
}

.result-actions .rematch-btn{
    margin-top:0;
}

.return-lobby-btn{
    width:100%;
    background:transparent;
    color:var(--text);
    border:1.5px solid #555d6d;
    border-radius:12px;
    padding:13px 22px;
    font-family:var(--font-display);
    font-size:16px;
    font-weight:700;
}

.return-lobby-btn:active{
    background:#303644;
}

.player-left-overlay{
    position:fixed;
    inset:0;
    z-index:30;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    background:rgba(10,12,20,.82);
    backdrop-filter:blur(4px);
    cursor:pointer;
}

.player-left-card{
    width:100%;
    max-width:340px;
    padding:34px 28px;
    background:var(--card);
    border:2px solid var(--enemy-dark);
    border-radius:20px;
    text-align:center;
    box-shadow:0 18px 50px rgba(0,0,0,.5);
}

.player-left-title{
    color:var(--enemy-light);
    font-family:var(--font-display);
    font-size:34px;
    font-weight:700;
}

.player-left-text{
    margin-top:10px;
    color:var(--text);
    font-size:16px;
}

.player-left-hint{
    margin-top:20px;
    color:var(--muted);
    font-size:13px;
}
    
/* ---------- TRAY ---------- */
.tray{ background:linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,.25) 30%); padding:8px 14px 16px; border-top:1px solid #222738; }
.tray-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.phase-tag{ font-family:var(--font-display); font-weight:600; font-size:14px; letter-spacing:.5px; color:var(--you-light); }
.timer-ring{ width:44px; height:44px; }
.timer-ring .track{ fill:none; stroke:#2a2f3d; stroke-width:5; }
.timer-ring text{ fill:var(--text); font-family:var(--font-display); font-weight:700; font-size:15px; text-anchor:middle; dominant-baseline:central; }


.tray-resources{
    display:flex;
    align-items:center;
    gap:10px;
    margin-left:auto;
}

.player-gold{
    position:relative;
    margin:0;
    min-width:64px;
    justify-content:center;
}

.gold-change{
    position:absolute;
    left:50%;
    top:-6px;
    z-index:3;
    pointer-events:none;
    opacity:0;
    font-family:var(--font-display);
    font-size:16px;
    font-weight:700;
    text-shadow:0 2px 3px rgba(0,0,0,.8);
    transform:translate(-50%, 0);
}

.gold-change.gain{
    color:#71e69b;
    animation:goldGainFloat .9s ease-out forwards;
}

.gold-change.spend{
    color:#ff7e68;
    animation:goldSpendFloat .9s ease-out forwards;
}

.player-gold.gold-gain{
    animation:goldGainChip .55s ease-out;
}

.player-gold.gold-spend{
    animation:goldSpendChip .55s ease-out;
}

@keyframes goldGainFloat{
    0%{
        opacity:0;
        transform:translate(-50%, 5px) scale(.8);
    }

    20%{
        opacity:1;
        transform:translate(-50%, -3px) scale(1.15);
    }

    100%{
        opacity:0;
        transform:translate(-50%, -25px) scale(1);
    }
}

@keyframes goldSpendFloat{
    0%{
        opacity:0;
        transform:translate(-50%, -5px) scale(.8);
    }

    20%{
        opacity:1;
        transform:translate(-50%, 2px) scale(1.15);
    }

    100%{
        opacity:0;
        transform:translate(-50%, 22px) scale(1);
    }
}

@keyframes goldGainChip{
    0%,100%{
        transform:scale(1);
        filter:none;
    }

    35%{
        transform:scale(1.12);
        filter:drop-shadow(0 0 7px rgba(92,208,138,.8));
        border-color:#5cd08a;
        color:#71e69b;
    }
}

@keyframes goldSpendChip{
    0%,100%{
        transform:translateX(0);
        border-color:rgba(255,194,60,.35);
        color:var(--gold);
    }

    20%{
        transform:translateX(-4px);
    }

    40%{
        transform:translateX(4px);
        border-color:var(--enemy);
        color:#ff7e68;
    }

    60%{
        transform:translateX(-3px);
    }

    80%{
        transform:translateX(2px);
    }
}
    
.cards{ display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; margin-bottom:12px; }
.game-card{
    position:relative;
    border:2px solid;
    border-radius:14px;
    padding:8px 6px 6px;
    display:flex;
    flex-direction:column;
    align-items:center;
    overflow:hidden;
    color:#fff;
    transition:
        transform .08s ease,
        border-color .12s ease,
        box-shadow .12s ease;
}

.game-card::before{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    background:linear-gradient(
        180deg,
        rgba(255,255,255,.12),
        rgba(0,0,0,.18)
    );
}

.game-card > *{
    position:relative;
    z-index:1;
}

.game-card.rarity-common{
    background:linear-gradient(180deg, #59616e, #303641);
    border-color:#aeb6c2;
}

.game-card.rarity-rare{
    background:linear-gradient(180deg, #2469a8, #163b69);
    border-color:#55b5ff;
    box-shadow:inset 0 0 18px rgba(74,163,255,.18);
}

.game-card.rarity-legendary{
    background:linear-gradient(180deg, #7636a5, #3e195f);
    border-color:#dc8cff;
    box-shadow:inset 0 0 20px rgba(200,116,255,.22);
}

.game-card.selected{
    border-color:var(--gold);
    transform:translateY(-4px);
    box-shadow:
        0 6px 16px rgba(0,0,0,.4),
        0 0 0 2px rgba(255,194,60,.35);
}

.game-card .cost{
    position:absolute;
    top:6px;
    left:6px;
    display:inline-flex;
    align-items:center;
    gap:3px;
    background:rgba(10,12,18,.82);
    border:1px solid rgba(255,194,60,.55);
    color:#ffd66f;
    border-radius:8px;
    padding:3px 7px;
    font-size:12px;
    font-weight:800;
    text-shadow:0 1px 2px #000;
}

.game-card .cost .coin{
    width:11px;
    height:11px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #ffe08a, var(--gold));
}

.game-card .rarity{
    position:absolute;
    top:8px;
    right:8px;
    width:9px;
    height:9px;
    border-radius:50%;
    box-shadow:0 0 0 2px rgba(0,0,0,.25);
}

.rarity.common{
    background:#c7cdd6;
}

.rarity.rare{
    background:#4aa3ff;
}

.rarity.legendary{
    background:#c874ff;
}

.game-card .portrait{
    width:70px;
    height:84px;
    display:block;
}

.game-card .cname{
    width:100%;
    min-height:30px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-top:2px;
    padding:4px 5px;
    border-radius:7px;
    background:rgba(10,12,18,.72);
    color:#fff;
    font-family:var(--font-display);
    font-weight:700;
    font-size:13px;
    line-height:1.05;
    text-align:center;
    text-shadow:0 1px 2px #000;
}

.lanes-row{
    display:flex;
    align-items:center;
    gap:10px;
}

.lane-hint{
    flex:1;
    color:var(--muted);
    font-size:12px;
    line-height:1.2;
}

.skip-btn{
    flex:none;
    background:transparent;
    border:1.5px solid #444;
    border-radius:12px;
    color:var(--muted);
    padding:12px 16px;
    font-weight:700;
    font-size:13px;
}
@media (prefers-reduced-motion: reduce){ *{ animation:none !important; } }

/* phase clarity */
.phase-tag{ font-size:17px; }
.phase-tag.phase-rest{ color:var(--you-light); }
.phase-tag.phase-battle{ color:var(--enemy-light); }
.phase-tag.phase-over{ color:var(--muted); }

.timer-ring text{ font-size:17px; }
.timer-ring.urgent text{ fill:var(--enemy); }
.timer-ring.urgent{ animation:ringPulse .5s ease-in-out infinite; }
@keyframes ringPulse{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.15); } }

.tray.locked .game-card,
.tray.locked .skip-btn{opacity:.4; pointer-events:none; filter:grayscale(.5); }

#phaseBanner{ position:fixed; inset:0; z-index:15; display:flex; align-items:center; justify-content:center; pointer-events:none; }
#phaseBanner span{ font-family:var(--font-display); font-weight:700; font-size:52px; letter-spacing:1px; padding:14px 32px; border-radius:16px; opacity:0; transform:scale(.7); }
#phaseBanner.show span{ animation:bannerPop 1.6s ease-out; }
#phaseBanner.battle span{ color:#fff; background:var(--enemy); box-shadow:0 10px 34px rgba(239,90,60,.5); }
#phaseBanner.rest span{ color:#062a2e; background:var(--you); box-shadow:0 10px 34px rgba(24,179,196,.5); }
@keyframes bannerPop{
    0%{ opacity:0; transform:scale(.7); }
    15%{ opacity:1; transform:scale(1.06); }
    30%{ transform:scale(1); }
    75%{ opacity:1; }
    100%{ opacity:0; transform:scale(1); }
}
</style>
</head>
<body>

<div class="frame">

    <!-- LOBBY -->
    <section id="lobby" class="lobby">
        <div class="brand">
            <svg class="crest" viewBox="0 0 100 100" aria-hidden="true">
                <polygon points="50,6 88,22 88,54 50,94 12,54 12,22" fill="#20242f" stroke="#3b3324" stroke-width="3"/>
                <polygon points="50,6 88,22 88,54 50,94 12,54 12,22" fill="none" stroke="#ffc23c" stroke-width="2" opacity=".5"/>
                <rect x="44" y="26" width="12" height="42" rx="4" fill="#dfe6ee" stroke="#241f18" stroke-width="2.5"/>
                <rect x="34" y="40" width="32" height="8" rx="4" fill="#9aa4b0" stroke="#241f18" stroke-width="2.5"/>
                <circle cx="50" cy="74" r="6" fill="#ffc23c"/>
            </svg>
            <h1>THE <em>ARENA</em></h1>
            <p>Three lanes. Three towers. Three minutes.</p>
        </div>

        <div class="make-room">
            <input id="roomName" placeholder="Name your room" maxlength="24">
            <button id="createRoom" class="btn-primary">Create</button>
        </div>

        <p id="status" class="status"></p>

        <div class="rooms-head">
            <h2>Open rooms</h2>
            <span class="count"><span id="roomCount">0 waiting</span></span>
        </div>

        <div id="rooms">Loading rooms...</div>
    </section>

    <!-- ARENA -->
    <section id="game" class="arena hidden">
        <div class="topbar">
<div class="side-tag"><span class="pip"></span>Opponent</div>
            <div class="match-center">
    <div id="matchClock" class="match-clock">3:00</div>
    <div id="matchInfo" class="match-info">Turn 1</div>
</div>
<div class="side-tag you-tag"><span class="pip"></span>You</div>
        </div>

        <div class="board-wrap">
            <svg id="board" viewBox="0 0 400 560" preserveAspectRatio="xMidYMid meet" aria-hidden="true"></svg>
        </div>

        <div class="tray">
           <div class="tray-head">
    <span id="phaseTag" class="phase-tag">Choose your play</span>

    <div class="tray-resources">
        <div id="playerGoldChip" class="gold-chip player-gold">
    <span class="coin"></span>
    <span id="youGold">0</span>
    <span id="goldChange" class="gold-change"></span>
    <span id="goldWarning" class="gold-warning">Not enough gold!</span>
</div>

        <svg class="timer-ring" viewBox="0 0 44 44" aria-label="Phase time remaining">
            <circle class="track" cx="22" cy="22" r="18"></circle>
            <text id="phaseTime" x="22" y="22">5</text>
        </svg>
    </div>
</div>

            <div id="cards" class="cards"></div>

            <div class="lanes-row">
    <span class="lane-hint">Choose a card, then tap a lane</span>
    <button id="skipBtn" class="skip-btn">Skip</button>
</div>
        </div>
    </section>


<div id="result" class="hidden">
    <div class="result-card">
        <div class="result-text">Victory</div>
        <div id="resultSub" class="result-sub"></div>

        <div class="result-actions">
    <button id="rematchBtn" class="rematch-btn">
        Play Again
    </button>

    <button id="returnLobbyBtn" class="return-lobby-btn">
        Return to Lobby
    </button>
</div>
<div id="playerLeftOverlay" class="player-left-overlay hidden">
    <div class="player-left-card">
        <div class="player-left-title">Player Left</div>
        <div class="player-left-text">
            Your opponent left the room.
        </div>
        <div class="player-left-hint">
            Click anywhere to return to the lobby
        </div>
    </div>
</div>
<div id="rematchStatus" class="rematch-status"></div>
    </div>
</div>
    <div id="phaseBanner" class="hidden"><span></span></div>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
