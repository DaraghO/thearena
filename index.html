<!DOCTYPE html>
<html>
<head>
    <title>The Arena</title>
</head>

<body>

<h1>The Arena</h1>

<div id="rooms">
    Loading rooms...
</div>

<input id="roomName" placeholder="Room name">

<button id="createRoom">
    Create Room
</button>

<p id="status"></p>


<div id="game" style="display:none;">

    <h2>Battle</h2>

    <div id="players"></div>

    <h3>Your Cards</h3>

    <div id="cards"></div>

    <h3>Select Lane</h3>

    <button class="laneButton" data-lane="lane1">
        Lane 1
    </button>

    <button class="laneButton" data-lane="lane2">
        Lane 2
    </button>

    <button class="laneButton" data-lane="lane3">
        Lane 3
    </button>


    <p id="selectionStatus">
        Choose a card and lane
    </p>

</div>


<script type="module" src="main.js"></script>

</body>
</html>
